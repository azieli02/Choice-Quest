<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta name="theme-color" content="#0f2747">
  <title>Choice Quest</title>
<link
  rel="icon"
  type="image/png"

>

>
  <link rel="stylesheet" href="css/styles.css">
