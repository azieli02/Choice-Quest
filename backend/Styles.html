<style>
  /**
   * Choice Quest
   * Version: 1.6.2
   * File: Styles.html
   */

  :root {
    --parchment:#f5e7c7;
    --parchment-light:#fff4d6;
    --parchment-deep:#d6b982;
    --forest:#183b2b;
    --forest-2:#24573f;
    --moss:#5f7f3f;
    --ink:#1f2a1f;
    --muted:#6f624b;
    --card:#fff5d8;
    --card-dark:#2c2118;
    --line:rgba(80,54,28,.22);
    --shadow:0 20px 45px rgba(37,26,14,.22);
    --wood:#5c3218;
    --wood-2:#8a5228;
    --wood-light:#b77a3b;
    --gold:#f4b63f;
    --gold-dark:#a35c12;
    --ruby:#dc2626;
    --sapphire:#2563eb;
    --emerald:#059669;
    --amethyst:#7c3aed;
    --topaz:#d97706;
    --rose:#be185d;
    --white:#fffaf0;
    --toast-bg:#183b2b;
  }

  * { box-sizing:border-box; }
  html, body { min-height:100%; }
  body {
    margin:0;
    font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--ink);
    background:
      linear-gradient(rgba(255,255,255,.10), rgba(255,255,255,.10)),
      url("https://drive.google.com/uc?export=view&id=1TZ_EBZ7HMAONNLw_SnTIF0C11_52XkXf") center center / cover no-repeat fixed;
  }


  
.background{
  position:fixed;
  inset:0;
  z-index:-100;
  overflow:hidden;
}
.background img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.app { max-width:1180px; margin:0 auto; padding:22px; position:relative; }
  header { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:18px; }
  .header-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

  h1 {
    margin:0;
    font-family: Georgia, "Times New Roman", serif;
    font-size:clamp(38px, 5vw, 68px);
    letter-spacing:-.045em;
    line-height:.92;
    color:#ffe9a6;
    text-shadow:0 4px 0 rgba(37,26,14,.34), 0 9px 25px rgba(0,0,0,.22);
  }
  h2 { margin:0; font-size:clamp(30px, 4vw, 46px); letter-spacing:-.03em; color:#24160d; font-family:Georgia, "Times New Roman", serif; font-weight:950; }
  h3 { margin:10px 0 4px; font-size:20px; }

  .subtitle { margin-top:8px; color:#fff1bf; font-size:15px; font-weight:700; text-shadow:0 2px 10px rgba(0,0,0,.22); }
  .links { color:#ffeec0; font-size:13px; line-height:1.4; max-width:520px; }
  .links code { background:rgba(255,244,214,.2); padding:2px 5px; border-radius:6px; color:#fff6d7; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(310px, 1fr)); gap:18px; align-items:start; }
  .kid-card, .panel {
    position:relative;
    background:linear-gradient(180deg, rgba(255,250,240,.96), rgba(245,231,199,.96));
    border:2px solid rgba(92,50,24,.24);
    border-radius:32px;
    padding:20px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .kid-card:before {
    content:"";
    position:absolute;
    inset:0 0 auto 0;
    height:12px;
    background:#0f2747;
    opacity:.95;
  }
  .kid-card[data-child="Colton"]:before{background:#7a3f56;}
  .kid-card:after {
    content:"";
    position:absolute;
    inset:12px 0 auto 0;
    height:4px;
    background:rgba(92,50,24,.18);
  }

  .kid-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-top:8px; }
  .ticket-pill, .saving-badge {
    white-space:nowrap;
    background:linear-gradient(180deg,#fff4c4,#f0c65c);
    border:2px solid rgba(111,66,18,.28);
    border-radius:999px;
    padding:10px 13px;
    font-weight:950;
    font-size:18px;
    color:#4b2508;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.55), 0 6px 18px rgba(88,49,16,.16);
  }
  .saving-badge { display:none; font-size:12px; color:var(--muted); padding:7px 10px; margin-top:8px; background:var(--parchment-light); }
  .kid-card.saving .saving-badge, .loading-card .saving-badge { display:inline-block; }

  .treasure-stage { display:flex; justify-content:center; align-items:flex-end; margin:16px 0 10px; min-height:310px; }
  .chest-area { position:relative; width:270px; height:300px; }

  .chest-lid {
    position:absolute;
    left:31px; top:68px;
    width:208px; height:96px;
    border-radius:18px 18px 10px 10px;
    background:
      linear-gradient(90deg, transparent 0 14%, rgba(255,236,142,.72) 14% 19%, transparent 19% 81%, rgba(255,236,142,.62) 81% 86%, transparent 86%),
      repeating-linear-gradient(180deg, rgba(255,255,255,.10) 0 2px, transparent 2px 18px),
      linear-gradient(180deg,#7a421d 0%, #57270f 68%, #2b1208 100%);
    border:6px solid rgba(55,28,12,.76);
    border-bottom-width:8px;
    box-shadow:inset 0 12px 16px rgba(255,255,255,.16), inset 0 -18px 26px rgba(0,0,0,.3), 0 10px 18px rgba(55,28,12,.18);
    z-index:2;
    transform:perspective(260px) rotateX(52deg);
    transform-origin:50% 100%;
  }
  .chest-lid:before {
    content:"";
    position:absolute;
    left:0; right:0; top:15px;
    height:15px;
    background:linear-gradient(90deg,#af681d,#ffe28d 45%,#c27a22);
    border-top:2px solid rgba(255,255,255,.3);
    border-bottom:3px solid rgba(60,28,10,.35);
  }
  .chest-lid:after {
    content:"";
    position:absolute;
    left:50%; top:-15px;
    width:38px; height:34px;
    transform:translateX(-50%);
    border-radius:10px 10px 7px 7px;
    background:linear-gradient(180deg,#fff0a7,#d48a24 70%,#89440f);
    border:3px solid rgba(80,37,11,.42);
    box-shadow:inset 6px 0 9px rgba(255,255,255,.28);
  }
  .chest-band { display:none; }

  .chest {
    position:absolute;
    left:20px; top:130px;
    width:230px; height:142px;
    border:7px solid rgba(55,28,12,.72);
    border-radius:14px 14px 30px 30px;
    background:
      linear-gradient(90deg, transparent 0 12%, rgba(255,216,92,.95) 12% 17%, transparent 17% 83%, rgba(255,216,92,.88) 83% 88%, transparent 88%),
      repeating-linear-gradient(180deg, rgba(255,255,255,.13) 0 2px, transparent 2px 24px),
      linear-gradient(135deg,#a9622d,#653013 62%,#3b1b0c);
    overflow:hidden;
    box-shadow:inset 16px 0 22px rgba(255,255,255,.11), inset -18px 0 24px rgba(0,0,0,.18), 0 18px 28px rgba(55,28,12,.24);
    z-index:5;
    transition:filter .3s ease, transform .3s ease;
  }
  .chest:before {
    content:"";
    position:absolute;
    left:0; right:0; top:0;
    height:32px;
    background:linear-gradient(180deg,#ffe08a,#d58a24 70%,#8f4613);
    border-bottom:4px solid rgba(55,28,12,.45);
    z-index:12;
  }
  .chest:after {
    content:"";
    position:absolute;
    left:8px; right:8px; top:34px;
    height:30px;
    border-radius:0 0 50% 50%;
    background:linear-gradient(180deg,rgba(31,13,5,.6),rgba(31,13,5,0));
    z-index:6;
    pointer-events:none;
  }
  .chest-lock {
    position:absolute;
    left:50%; top:18px;
    width:42px; height:46px;
    transform:translateX(-50%);
    clip-path:polygon(50% 0, 93% 20%, 84% 86%, 50% 100%, 16% 86%, 7% 20%);
    background:linear-gradient(180deg,#fff1a8,#d99424 70%,#8c4a12);
    border:0;
    z-index:15;
    box-shadow:0 5px 12px rgba(0,0,0,.18), inset 6px 0 10px rgba(255,255,255,.25);
  }
  .chest-lock:before {
    content:"";
    position:absolute;
    inset:4px;
    clip-path:inherit;
    border:2px solid rgba(86,39,9,.42);
  }
  .chest-lock:after {
    content:"";
    position:absolute;
    left:50%; top:16px;
    width:8px; height:14px;
    transform:translateX(-50%);
    border-radius:999px;
    background:#4b210a;
  }

  .kid-card.celebrating .chest { filter:drop-shadow(0 0 28px rgba(244,182,63,.9)); animation:chestBounce .8s ease both; }
  .kid-card.emptying .chest { animation:tipChest 1.05s ease-in-out both; }
  .chest-shine {
    position:absolute;
    left:24px; top:48px;
    width:24px; height:72px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    filter:blur(.3px);
    z-index:11;
  }
  .chest-fill-line { position:absolute; left:0; right:0; bottom:22px; border-top:2px dashed rgba(255,255,255,.14); z-index:7; }
  .shelf {
    position:absolute;
    left:0; right:0; bottom:2px;
    height:30px;
    border-radius:999px;
    background:linear-gradient(180deg,var(--wood-light),var(--wood-2) 45%,var(--wood));
    box-shadow:0 12px 20px rgba(59,32,13,.26);
    z-index:1;
  }
  .shelf:after { content:""; position:absolute; left:20px; right:20px; top:7px; height:4px; border-radius:999px; background:rgba(255,255,255,.2); }

  .gem {
    position:absolute;
    width:40px; height:42px;
    clip-path:polygon(50% 0%, 86% 18%, 96% 47%, 50% 100%, 4% 47%, 14% 18%);
    background:
      linear-gradient(120deg, rgba(255,255,255,.82) 0 13%, transparent 14%),
      linear-gradient(155deg, transparent 0 31%, rgba(255,255,255,.36) 32% 36%, transparent 37%),
      linear-gradient(25deg, transparent 0 46%, rgba(0,0,0,.16) 47% 54%, transparent 55%),
      radial-gradient(circle at 35% 25%, rgba(255,255,255,.68), transparent 24%),
      linear-gradient(135deg, color-mix(in srgb, var(--gem-color), white 35%), var(--gem-color) 48%, color-mix(in srgb, var(--gem-color), black 32%));
    box-shadow:inset -9px -10px 13px rgba(0,0,0,.2), inset 8px 8px 12px rgba(255,255,255,.42), 0 4px 8px rgba(0,0,0,.24);
    z-index:10;
    transform:rotate(var(--gem-rotate, 0deg));
    transform-origin:50% 58%;
    transition: opacity .18s ease, transform .18s ease;
  }
  .gem.drop { animation:drop .58s cubic-bezier(.2,1.5,.45,1) both; }
  .kid-card.emptying .gem { animation:rollOut 1s ease-in forwards; }
  .gem-facet { position:absolute; display:block; background:rgba(255,255,255,.38); pointer-events:none; }
  .gem-facet-a { left:19px; top:4px; width:2px; height:34px; transform:rotate(16deg); }
  .gem-facet-b { left:7px; top:18px; width:27px; height:2px; transform:rotate(-10deg); }
  .gem-facet-c { left:13px; top:8px; width:2px; height:32px; transform:rotate(-22deg); background:rgba(0,0,0,.12); }

  .meter { text-align:center; margin-top:0; }
  .big-progress { font-size:28px; font-weight:950; letter-spacing:-.02em; color:#2f1a0d; }
  .hint { color:var(--muted); font-size:15px; margin-top:4px; min-height:22px; }
  .quest-rewards { margin-top:10px; color:#70501f; font-size:12px; text-transform:uppercase; letter-spacing:.16em; font-weight:950; }

  .buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
  button { border:0; border-radius:18px; padding:17px 12px; font-size:18px; font-weight:950; color:#20150b; cursor:pointer; box-shadow:0 7px 16px rgba(52,32,14,.18); transition:transform .08s ease, opacity .15s ease, box-shadow .15s ease; }
  button:active { transform:scale(.97); box-shadow:0 3px 8px rgba(52,32,14,.14); }
  button:disabled { opacity:.55; cursor:wait; }
  .good { background:linear-gradient(180deg,#b7e7c5,#3f8f63); }
  .bonus { background:linear-gradient(180deg,#f7d978,#cf8a1b); }
  .oops { background:linear-gradient(180deg,#f8c0c8,#d86b84); }
  .undo { background:linear-gradient(180deg,#d7cef8,#7d63d8); }
  .ghost {
  background: linear-gradient(180deg, rgb(249, 242, 224) 0%, rgb(231, 219, 191) 100%);
  color: rgb(74, 56, 26);
  border: 2px solid rgb(181, 160, 115);
  border-radius: 12px;
  font-family: Inter, Arial, sans-serif;
  font-size: 18px;
  font-weight: 900;
  padding: 12px 18px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.65), 0 2px 0 rgb(166,146,101), 0 4px 10px rgba(0,0,0,.18);
  transition: transform .06s ease, filter .12s ease, box-shadow .12s ease;
}

  .loading, .error { padding:32px; text-align:center; color:var(--muted); }
  .loading-content { padding:0; text-align:initial; color:inherit; }
  .loading-card { opacity:.84; }
  .loading-card .chest { background:linear-gradient(90deg,rgba(255,244,214,.52),rgba(92,50,24,.24)); }
  body.is-loading .header-actions button { opacity:.7; }
  .toast {
    position:fixed;
    left:50%; bottom:20px;
    transform:translateX(-50%);
    display:none;
    background:var(--toast-bg);
    color:#fff7d6;
    padding:12px 16px;
    border-radius:999px;
    font-weight:800;
    z-index:200;
    box-shadow:0 10px 28px rgba(0,0,0,.18);
  }

  .celebrate {
    display:none; position:fixed; inset:0; pointer-events:none; align-items:center; justify-content:center; text-align:center;
    color:#3c210c; background:radial-gradient(circle, rgba(255,244,214,.94), rgba(23,54,37,.28)); z-index:99;
  }
  .celebrate.show { display:flex; animation:celebrateFade 6s ease-in-out forwards; }
  .celebrate-card { background:linear-gradient(180deg,rgba(255,250,240,.94),rgba(245,231,199,.94)); border:4px solid rgba(244,182,63,.48); border-radius:34px; padding:28px 34px; box-shadow:0 28px 80px rgba(55,28,12,.28); }
  .celebrate-kicker { font-size:22px; font-weight:950; color:var(--forest); margin-bottom:8px; text-transform:uppercase; letter-spacing:.14em; }
  .celebrate-title { font-family:Georgia, "Times New Roman", serif; font-size:clamp(42px, 7vw, 86px); font-weight:950; line-height:.95; letter-spacing:-.04em; color:#5a2c0e; }
  .gold-ticket { display:inline-block; margin-top:18px; background:linear-gradient(135deg,#fff2a8,var(--gold)); border:3px dashed rgba(124,45,18,.48); border-radius:16px; padding:14px 28px; font-size:clamp(28px, 4vw, 48px); font-weight:950; transform:rotate(-2deg); animation:ticketPop 6s ease-in-out both; }
  .confetti { position:fixed; top:-18px; width:10px; height:18px; border-radius:3px; animation:fall 2.8s linear forwards; z-index:100; pointer-events:none; }

  @keyframes drop { 0% { transform:translateY(-210px) scale(.72) rotate(calc(var(--gem-rotate, 0deg) - 18deg)); opacity:.35; } 70% { transform:translateY(7px) scale(1.06) rotate(calc(var(--gem-rotate, 0deg) + 7deg)); opacity:1; } 100% { transform:translateY(0) scale(1) rotate(var(--gem-rotate, 0deg)); opacity:1; } }
  @keyframes chestBounce { 0%{transform:scale(1)} 38%{transform:scale(1.035)} 100%{transform:scale(1)} }
  @keyframes tipChest { 0%{transform:rotate(0)} 45%{transform:rotate(-7deg) translateX(-6px)} 100%{transform:rotate(0)} }
  @keyframes rollOut { to { transform:translate(132px, 76px) rotate(460deg) scale(.75); opacity:0; } }
  @keyframes celebrateFade { 0%{opacity:0; transform:scale(.92)} 10%{opacity:1; transform:scale(1)} 82%{opacity:1} 100%{opacity:0; transform:scale(.98)} }
  @keyframes ticketPop { 0%,12%{transform:translateY(20px) scale(.72) rotate(-8deg); opacity:0} 22%,82%{transform:translateY(0) scale(1) rotate(-2deg); opacity:1} 100%{transform:translateY(-8px) scale(.96) rotate(2deg); opacity:0} }
  @keyframes fall { to { transform:translateY(105vh) rotate(620deg); opacity:.9; } }

  body.dakboard {
    background:
  linear-gradient(rgba(255,255,255,.10), rgba(255,255,255,.10)),
  url("https://raw.githubusercontent.com/azieli02/Behavior-Tracker/main/Pirate%20Image%20Sample.PNG")
  center center / cover no-repeat fixed;
    overflow:hidden;
  }
  body.dakboard .app { max-width:1500px; padding:34px; }
  body.dakboard header { justify-content:center; text-align:center; margin-bottom:20px; }
  body.dakboard h1 { font-size:clamp(54px, 5.6vw, 96px); }
  body.dakboard .subtitle { font-size:24px; color:#fff1bf; }
  body.dakboard .grid { grid-template-columns:repeat(2, minmax(420px, 1fr)); gap:28px; }
  body.dakboard .kid-card { text-align:center; padding:34px; border-radius:42px; }
  body.dakboard h2 { font-size:clamp(54px, 5vw, 88px); }
  body.dakboard .treasure-stage { min-height:420px; }
  body.dakboard .chest-area { transform:scale(1.34); transform-origin:center bottom; }
  body.dakboard .big-progress { font-size:48px; }
  body.dakboard .hint { font-size:26px; }
  body.dakboard .quest-rewards { font-size:16px; }
  body.dakboard .ticket-pill { font-size:34px; padding:15px 20px; }
  body.dakboard .parent-only { display:none !important; }

  @media (max-width:840px) {
    body {
      background:
        linear-gradient(rgba(255,255,255,.10), rgba(255,255,255,.10)),
        url("https://drive.google.com/uc?export=view&id=1TZ_EBZ7HMAONNLw_SnTIF0C11_52XkXf") center center / cover no-repeat fixed;
    }
    .app { padding:14px; }
    header { align-items:stretch; flex-direction:column; }
    .header-actions { justify-content:flex-start; }
    .kid-top { flex-direction:column; }
    .ticket-pill { align-self:flex-start; }
    .treasure-stage { min-height:285px; }
    .chest-area { transform:scale(.92); transform-origin:center bottom; }
  }
</style>
